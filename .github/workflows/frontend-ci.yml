name: Frontend CI

# Triggers:
#  - PRs to develop or main → CI only
#  - Pushes to develop      → CI only
#  - Pushes to main         → CI + CD (deploy)
on:
  push:
    branches: [main, develop]
    paths:
      - 'PROJEKAT/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'PROJEKAT/frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    # Build-time configuration. Vite inlines anything prefixed with VITE_ into
    # the bundle, so non-secret values like the API URL belong here. NEVER put
    # actual secrets in VITE_ vars — anything bundled is publicly visible.
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:5032' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: PROJEKAT/frontend/package-lock.json

      - name: Install dependencies
        working-directory: PROJEKAT/frontend
        run: npm ci

      - name: Lint
        working-directory: PROJEKAT/frontend
        run: npm run lint

      - name: Build
        working-directory: PROJEKAT/frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: PROJEKAT/frontend/dist
          retention-days: 7

  # Deploy to Netlify — only on push to main, after a green build.
  # Requires two GitHub Secrets (Settings → Secrets → Actions):
  #   NETLIFY_AUTH_TOKEN — Personal access token from Netlify user settings
  #   NETLIFY_SITE_ID    — Site ID from Netlify site configuration
  deploy:
    name: Deploy to Netlify
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: npx netlify-cli deploy --prod --dir=dist --site=$NETLIFY_SITE_ID --auth=$NETLIFY_AUTH_TOKEN
