name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'PROJEKAT/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'PROJEKAT/frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: PROJEKAT/frontend/package-lock.json

      - name: Install dependencies
        working-directory: PROJEKAT/frontend
        run: npm ci

      - name: Lint
        working-directory: PROJEKAT/frontend
        run: npm run lint

      - name: Build
        working-directory: PROJEKAT/frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: PROJEKAT/frontend/dist