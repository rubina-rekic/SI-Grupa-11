name: Backend CI

# Build i restore. Deployment ide kroz Render auto-deploy (Render watcha main).
on:
  push:
    branches: [main, develop]
    paths:
      - 'PROJEKAT/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'PROJEKAT/backend/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore PROJEKAT/backend/PostRoute.sln

      - name: Build
        run: dotnet build PROJEKAT/backend/PostRoute.sln --configuration Release --no-restore
