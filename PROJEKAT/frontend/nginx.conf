server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the backend container.
    # Docker's internal DNS resolves "backend" to the backend service IP.
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;

        # Forward original request info so the backend can log the real IP
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check proxy — used by Docker Compose to verify the stack is up
    location /health {
        proxy_pass http://backend:5000/health;
    }

    # SPA fallback: any path that isn't a real file returns index.html
    # so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers
    add_header X-Frame-Options   "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff" always;
}
