services:
  postgres:
    image: postgres:16
    container_name: postroute-postgres
    environment:
      POSTGRES_DB: postroute
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postroute-dev-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postroute-dev-data:
