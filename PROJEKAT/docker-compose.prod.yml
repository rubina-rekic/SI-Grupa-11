# Production Docker Compose — no local Postgres (database is Neon cloud).
# Start with: docker compose -f docker-compose.prod.yml up -d --build
#
# Required environment variables (set in a .env file on the VM, never commit it):
#   DATABASE_URL     — Neon connection string (Host=...;SslMode=Require)
#   SEEDING_ENABLED  — true on first deploy, false afterwards (optional)

services:

  # ── Backend (.NET 9 API) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: postroute-backend
    environment:
      # .NET reads __ as : so this sets ConnectionStrings:DefaultConnection
      ConnectionStrings__DefaultConnection: ${DATABASE_URL}
      ASPNETCORE_ENVIRONMENT: Production
      # Seed default users on first deploy; disable afterwards
      Seeding__Enabled: ${SEEDING_ENABLED:-false}
    expose:
      # Port is internal only — Nginx is the only entry point
      - "5000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Nginx (reverse proxy + static frontend) ────────────────────────────────
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: postroute-nginx
    ports:
      # Expose only port 80 to the host; add 443 when you set up SSL (certbot)
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
