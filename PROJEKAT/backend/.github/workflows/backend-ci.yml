name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'PROJEKAT/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'PROJEKAT/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore PROJEKAT/backend/PostRoute.sln

      - name: Build
        run: dotnet build PROJEKAT/backend/PostRoute.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish PROJEKAT/backend/src/PostRoute.Api/PostRoute.Api.csproj --configuration Release --no-build --output PROJEKAT/backend/artifacts/publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: PROJEKAT/backend/artifacts/publish
