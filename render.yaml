# Render deklarativna konfiguracija — backend deploy iz main grane.
# Tajne (Neon connection string, Cors origins) se postavljaju kroz Render
# dashboard (Settings -> Environment), NE u ovom fajlu.

services:
  - type: web
    name: postroute-backend
    runtime: docker
    rootDir: PROJEKAT/backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Postaviti rucno u Render dashboardu:
      #   ConnectionStrings__DefaultConnection  - Neon connection string
      #   Cors__AllowedOrigins__0               - Netlify URL
      #   Seeding__Enabled                      - true (prvi deploy), pa false
