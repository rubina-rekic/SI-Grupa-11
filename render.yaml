# Render deklarativna konfiguracija — automatski deploy backend-a iz ove grane.
# Render automatski pull-uje na svaki push u branch koji je niže naveden.
#
# Tajne (Neon connection string, CORS origins) se postavljaju kroz Render
# dashboard (Settings -> Environment), NE u ovom fajlu — render.yaml je u repu.
#
# Da Render prati ovaj fajl: u dashboardu otvori projekat, postavi
# "Auto-Deploy: yes" i grana = main.

services:
  - type: web
    name: postroute-backend
    runtime: docker
    rootDir: PROJEKAT/backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # ConnectionStrings__DefaultConnection — set manually in Render dashboard
      # Cors__AllowedOrigins__0  — set manually (Netlify URL)
      # Seeding__Enabled         — set to "true" on first deploy, "false" after
